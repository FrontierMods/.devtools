version: "3"

tasks:
    build:
        desc: "Build Autodoc"
        sources:
            - "src/**/*.ts"
            - "tsconfig.json"
            - "../../tsconfig.base.json"
        generates:
            - "dist/**/*.js"
            - "dist/**/*.d.ts"
        cmds:
            - bun run build

    typecheck:
        desc: "Typecheck Autodoc"
        cmds:
            - bun run typecheck

    lint:
        desc: "Lint Autodoc"
        cmds:
            - bun run lint

    format:
        desc: "Format Autodoc"
        cmds:
            - bun run format

    check:
        desc: "Check formatting on Autodoc"
        cmds:
            - bun run format:check

    ci:
        desc: "Run all CI checks"
        cmds:
            - task: typecheck
            - task: lint
            - task: check
